name: "ZOE"
version: "0.1.0"
slug: "zoe_ha_bridge"
description: "WhatsApp-controlled Home Assistant assistant powered by Claude"
arch:
  - aarch64
  - amd64
init: false
ports:
  "8000/tcp": 8000
ports_description:
  "8000/tcp": "WhatsApp webhook (proxy through Cloudflare Tunnel, do not expose directly)"
options:
  anthropic_api_key: ""
  ha_long_lived_token: ""
  whatsapp_phone_number_id: ""
  whatsapp_access_token: ""
  whatsapp_verify_token: ""
  whatsapp_app_secret: ""
  allowed_sender_numbers: ""
  confirmation_ttl_seconds: 120
schema:
  anthropic_api_key: str
  ha_long_lived_token: str
  whatsapp_phone_number_id: str
  whatsapp_access_token: str
  whatsapp_verify_token: str
  whatsapp_app_secret: str
  allowed_sender_numbers: str
  confirmation_ttl_seconds: int
homeassistant_api: true
