# Entity catalog for ZOE. Add a device here and it becomes controllable —
# no code changes needed. `risky: true` means ZOE will ask for an explicit
# "yes"/"confirm" reply before calling the service.

entities:
  - entity_id: cover.tris_shahen
    name: "תריס שכן (סלון)"
    domain: cover
    services: [open_cover, close_cover, stop_cover, set_cover_position]
    risky: false

  - entity_id: light.light_shahen
    name: "אור תריס שכן (סלון)"
    domain: light
    services: [turn_on, turn_off]
    risky: false

  - entity_id: cover.tris_street
    name: "תריס רחוב (סלון)"
    domain: cover
    services: [open_cover, close_cover, stop_cover, set_cover_position]
    risky: false

  - entity_id: light.light_street
    name: "אור תריס רחוב (סלון)"
    domain: light
    services: [turn_on, turn_off]
    risky: false

  - entity_id: switch.dvd_boiler
    name: "דוד מים"
    domain: switch
    services: [turn_on, turn_off]
    risky: false

  - entity_id: lock.aqara_smart_lock_u200
    name: "מנעול דלת כניסה"
    domain: lock
    services: [lock, unlock]
    risky: true
